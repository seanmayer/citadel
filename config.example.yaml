default_command: "git status"

keybindings:
  open_editor: "o"
  refresh: "r"
  fetch_refresh: "R"
  quit: "q"
  help: "?"

editor:
  command: "code"
  args:
    - "."

git:
  base_branch: "origin/main"
  fetch_on_refresh: false
  auto_refresh_interval: "30s"
  show_remote_status: true
  show_merge_status: true
  show_dirty_status: true

ui:
  show_commit_hash: true
  show_branch: true
